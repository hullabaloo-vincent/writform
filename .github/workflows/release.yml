# Release pipeline (runs on tag push, e.g. `git tag v0.1.0 && git push --tags`):
# - Server: Docker image → GHCR (GitHub Packages) + bare Linux binary on the Release
# - Desktop: signed Tauri bundles + updater manifest → GitHub Releases
#
# Desktop auto-update: the public key + GitHub Releases endpoint are configured
# in apps/desktop/src-tauri/tauri.conf.json. The matching PRIVATE key lives at
# ~/.tauri/writform-updater.key on the machine that generated it (empty
# password) — NEVER commit it. One-time before the first release, add repo
# secrets: TAURI_SIGNING_PRIVATE_KEY (file contents) and
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD (empty string).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # The updater compares APP versions, not git tags — a tag that doesn't
  # match tauri.conf.json ships an app that reports "up to date" forever
  # (this happened through v0.4: every build called itself 0.1.0). Fail
  # fast instead. Tags are `v<version>`, e.g. version 0.5.0 → tag v0.5.0.
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          app_version=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)
          if [ "v${app_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match the app version ${app_version}."
            echo "::error::Bump 'version' in apps/desktop/src-tauri/tauri.conf.json (and package.json + workspace Cargo.toml), or retag as v${app_version}."
            exit 1
          fi

  server-docker:
    needs: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/writform-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/writform-server:latest

  server-binary:
    needs: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p writform-server
      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/writform-server

  # macOS is intentionally absent: those builds ship as source. Users build
  # locally with scripts/Build WritForm (macOS).command, which avoids the
  # Gatekeeper quarantine that an unnotarized downloaded .app would hit.
  desktop:
    needs: version-guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Tauri system deps (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
        working-directory: apps/desktop
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "WritForm ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: |
            ## Install

            **Windows / Linux** — download the installer for your platform below.

            **macOS** — build from source (one double-click). Downloading an
            unnotarized `.app` would trip Gatekeeper; building locally avoids
            that entirely. Clone the repo and run
            `scripts/Build WritForm (macOS).command` — it checks for and offers
            to install everything the build needs. See the
            [setup guide](https://hullabaloo-vincent.github.io/writform/setup/)
            for details and for connecting to or hosting a server.
          args: ${{ matrix.args }}
