# Release pipeline (runs on tag push, e.g. `git tag v0.1.0 && git push --tags`):
# - Server: Docker image → GHCR (GitHub Packages) + bare Linux binary on the Release
# - Desktop: signed Tauri bundles + updater manifest → GitHub Releases
#
# Desktop auto-update: the public key + GitHub Releases endpoint are configured
# in apps/desktop/src-tauri/tauri.conf.json. The matching PRIVATE key lives at
# ~/.tauri/writform-updater.key on the machine that generated it (empty
# password) — NEVER commit it. One-time before the first release, add repo
# secrets: TAURI_SIGNING_PRIVATE_KEY (file contents) and
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD (empty string).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  server-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/writform-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/writform-server:latest

  server-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p writform-server
      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/writform-server

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Tauri system deps (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
        working-directory: apps/desktop
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "WritForm ${{ github.ref_name }}"
          releaseDraft: true
          # The macOS build is ad-hoc signed but not notarized (that needs a
          # paid Apple Developer account), so first launch needs one command.
          releaseBody: |
            ## Install

            **macOS** — drag WritForm to Applications, then run once:

            ```sh
            xattr -dr com.apple.quarantine /Applications/WritForm.app
            ```

            WritForm is signed but not notarized (notarization requires a paid
            Apple Developer membership). Without this, macOS refuses to open
            it. You can instead open it once and choose **Open Anyway** in
            System Settings → Privacy & Security. On macOS 15+ the old
            Control-click → Open shortcut no longer works.

            **Windows / Linux** — download the installer for your platform below.

            See the [setup guide](https://hullabaloo-vincent.github.io/writform/setup/)
            for connecting to or hosting a server.
          args: ${{ matrix.args }}
